<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Rent a Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen">

    <nav class="bg-[#ffc107] p-4 shadow-md text-white flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="../imagens/icone.png" alt="Logo" class="w-8">
            <span class="text-xl font-bold uppercase tracking-tight">Painel Admin</span>
        </div>
        <div class="space-x-4">
            <a href="gestao.html" class="hover:underline font-semibold">Agendamentos</a>
            <button id="btn_logout"
                class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm font-bold transition">SAIR</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-6">
        <section class="bg-white p-8 rounded-lg shadow-md mb-10">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Cadastrar Novo Usuário</h2>
            <form id="form_usuario" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">E-mail (Login)</label>
                    <input type="email" id="novo_login" required
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-yellow-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Senha</label>
                    <input type="password" id="nova_senha" required
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-yellow-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nível de Acesso</label>
                    <select id="novo_nivel"
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-yellow-500 outline-none bg-white">
                        <option value="Operador">Operador</option>
                        <option value="Admin">Administrador</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit"
                        class="w-full bg-[#ffc107] hover:bg-yellow-500 text-white font-bold py-2 rounded transition shadow-md uppercase text-sm">
                        Salvar Acesso
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-white text-xs uppercase">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Usuário</th>
                        <th class="px-6 py-4">Nível</th>
                        <th class="px-6 py-4 text-center">Ação</th>
                    </tr>
                </thead>
                <tbody id="tabela_usuarios" class="divide-y divide-gray-200 text-sm">
                </tbody>
            </table>
        </section>
    </main>

    <script src="../js/usuarios.js"></script>
</body>

</html>
