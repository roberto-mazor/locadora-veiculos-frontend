<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Frota - Rent a Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen">

    <nav class="bg-[#ffc107] p-4 shadow-md text-white flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="../imagens/icone.png" alt="Logo" class="w-8">
            <span class="text-xl font-bold uppercase tracking-tight">Painel de Gestão</span>
        </div>
        <div class="space-x-4 flex items-center">
            <a href="usuarios.html" class="hover:underline font-semibold">Usuários</a>
            <button id="btn_logout"
                class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm font-bold transition">SAIR</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Agendamentos de Clientes</h1>
            <p class="text-sm text-gray-500">Operador: <span id="nome_operador" class="font-bold">Carregando...</span>
            </p>
        </header>

        <div class="bg-white rounded-lg shadow-xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-white uppercase text-xs">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Cliente</th>
                        <th class="px-6 py-4">E-mail</th>
                        <th class="px-6 py-4">Veículo / Categoria</th>
                        <th class="px-6 py-4">Data</th>
                        <th class="px-6 py-4 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela_reservas" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>

        <div class="mt-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Controle da Frota</h2>
            <div id="lista_frota" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
        </div>
    </main>

    <script src="../js/gestao.js"></script>
</body>

</html>
