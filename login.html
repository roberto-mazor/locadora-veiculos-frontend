<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rent a Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#ffc107] font-sans h-screen flex items-center justify-center">
    <main class="bg-white w-full max-w-md p-10 rounded-lg shadow-2xl text-center mx-4">
        <div class="flex justify-center mb-6">
            <img src="imagens/icone.png" alt="Ícone" class="w-16">
        </div>

        <h2 class="text-3xl font-bold text-gray-800 mb-2">Acesso Restrito</h2>
        <p class="text-gray-600 mb-8 font-semibold">Entre com suas credenciais</p>

        <form class="text-left">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">Usuário (E-mail)</label>
                <input type="email" id="login_usuario"
                    class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-500 transition"
                    placeholder="admin@admin.com.br">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Senha</label>
                <input type="password" id="senha_usuario"
                    class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-500 transition">
            </div>

            <button type="button" id="btn_entrar"
                class="w-full bg-[#ffc107] hover:bg-yellow-500 text-white font-bold py-3 rounded uppercase tracking-wider transition duration-300 shadow-md">
                Entrar no Painel
            </button>

            <p id="mensagem_erro" class="hidden text-red-600 text-sm mt-4 text-center font-medium"></p>
        </form>
    </main>

    <script src="app-login.js"></script>
</body>

</html>
